<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edunexa Pro v8 - Tomy Satria</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5402/5402377.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { 
            --primary: #4f46e5; --bg: #f1f5f9; --white: #ffffff; 
            --danger: #ef4444; --gray: #64748b; 
        }

        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 120px; color: #1e293b; }

        .card { background: var(--white); padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 22px; margin: 10px 0 20px; color: var(--gray); }
        h3 { font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }

        /* Tombol yang nyaman untuk HP */
        button { border: none; font-weight: 800; padding: 18px; border-radius: 14px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 2px solid #e2e8f0; color: #475569; }

        /* Layout Siswa & Input */
        .siswa-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; gap: 10px; }
        .nama-siswa { font-size: 14px; font-weight: 600; flex: 1; }
        .nilai-input { width: 70px; height: 45px; text-align: center; font-weight: 700; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; }
        .nilai-input.low-score { border-color: var(--danger); background: #fef2f2; }

        /* Statistik */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-item { background: #f8fafc; padding: 10px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 14px; font-weight: 800; color: var(--primary); }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #e2e8f0; z-index: 100; }
        .footer button { flex: 1; margin: 0; }
    </style>
</head>
<body>

    <div id="inputArea">
        <h1>INPUT NILAI EDUNEXA</h1>
        
        <div class="card">
            <h3>Data Siswa</h3>
            <button class="btn-outline" onclick="toggleSetup()">EDIT DAFTAR NAMA</button>
        </div>

        <div class="card">
            <h3>Kontrol Mapel</h3>
            <select id="mapel" onchange="gantiMapel()" style="width:100%; padding:15px; border-radius:12px; margin-bottom:10px;">
                <option>Matematika</option><option>B Indonesia</option><option>IPAS</option>
                <option>Pend Pancasila</option><option>B Inggris</option><option>Agama</option>
                <option>Seni Budaya</option><option>PJOK</option><option>Koding</option><option>B Jawa</option>
            </select>
            <div id="riwayatMateri" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
        </div>

        <div class="card" id="statsCard" style="display:none;">
            <h3>Statistik</h3>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-val" id="avgVal">0</div><div style="font-size:9px">RATA</div></div>
                <div class="stat-item"><div class="stat-val" id="maxVal">0</div><div style="font-size:9px">MAX</div></div>
                <div class="stat-item"><div class="stat-val" id="minVal">0</div><div style="font-size:9px">MIN</div></div>
            </div>
        </div>

        <div class="card">
            <h3>Input Nilai</h3>
            <input type="date" id="tanggal" style="padding:15px; width:100%; border-radius:12px; border:1px solid #ccc; margin-bottom:10px;">
            <input type="text" id="materi" placeholder="Nama Materi" oninput="refreshRiwayat()" style="padding:15px; width:100%; border-radius:12px; border:1px solid #ccc;">
            <div id="listSiswaContainer" style="margin-top:20px;"></div>
        </div>

        <div class="footer">
            <button class="btn-outline" onclick="simpanKeHP()">SIMPAN</button>
            <button class="btn-main" onclick="bagikanCSV()">EKSPOR CSV</button>
        </div>
    </div>

    <div id="setupArea" style="display:none;">
        <div class="card">
            <h3>Pengaturan Nama Siswa</h3>
            <textarea id="rawSiswa" rows="15" style="width:100%; padding:15px; border-radius:12px;"></textarea>
            <button class="btn-main" onclick="simpanSiswa()">SIMPAN & URUTKAN</button>
            <button class="btn-outline" onclick="toggleSetup()">KEMBALI</button>
        </div>
    </div>

    <script>
        let dbNilai = JSON.parse(localStorage.getItem('db_edunexa_v8')) || {};
        let daftarSiswa = JSON.parse(localStorage.getItem('db_siswa_v8')) || [];

        function initApp() { renderSiswa(); document.getElementById('tanggal').value = new Date().toISOString().split('T')[0]; }
        
        function hitungStatistik() {
            const inputs = document.querySelectorAll('.nilai-input');
            let nilaiArr = [];
            inputs.forEach(inp => { if(inp.value !== "") nilaiArr.push(parseFloat(inp.value)); });
            if (nilaiArr.length === 0) { document.getElementById('statsCard').style.display = 'none'; return; }
            document.getElementById('statsCard').style.display = 'block';
            document.getElementById('avgVal').innerText = (nilaiArr.reduce((a,b)=>a+b,0)/nilaiArr.length).toFixed(1);
            document.getElementById('maxVal').innerText = Math.max(...nilaiArr);
            document.getElementById('minVal').innerText = Math.min(...nilaiArr);
            inputs.forEach(inp => { inp.classList.toggle('low-score', inp.value !== "" && parseFloat(inp.value) < 75); });
        }

        function toggleSetup() { document.getElementById('inputArea').style.display = document.getElementById('inputArea').style.display === 'none' ? 'block' : 'none'; document.getElementById('setupArea').style.display = document.getElementById('setupArea').style.display === 'none' ? 'block' : 'none'; }
        
        function simpanSiswa() { 
            daftarSiswa = document.getElementById('rawSiswa').value.split('\n').map(s => s.trim()).filter(s => s !== "").sort(); 
            localStorage.setItem('db_siswa_v8', JSON.stringify(daftarSiswa)); renderSiswa(); toggleSetup(); 
        }

        function renderSiswa() {
            const container = document.getElementById('listSiswaContainer');
            container.innerHTML = "";
            daftarSiswa.forEach((nama, idx) => {
                const row = document.createElement('div');
                row.className = 'siswa-row';
                row.innerHTML = `<div class="nama-siswa">${idx + 1}. ${nama}</div><input type="number" class="nilai-input" onfocus="this.select()" oninput="hitungStatistik()">`;
                container.appendChild(row);
            });
            document.getElementById('rawSiswa').value = daftarSiswa.join('\n');
            refreshRiwayat();
        }

        function simpanKeHP() {
            const mapel = document.getElementById('mapel').value;
            const materi = document.getElementById('materi').value.trim();
            if (!materi) return alert("Isi materi!");
            let nilai = Array.from(document.querySelectorAll('.nilai-input')).map(inp => inp.value || "0");
            if (!dbNilai[mapel]) dbNilai[mapel] = {};
            dbNilai[mapel][materi] = nilai;
            localStorage.setItem('db_edunexa_v8', JSON.stringify(dbNilai));
            alert("✅ Disimpan!");
            refreshRiwayat();
        }

        function refreshRiwayat() {
            const mapel = document.getElementById('mapel').value;
            const box = document.getElementById('riwayatMateri');
            box.innerHTML = "";
            if (dbNilai[mapel]) {
                for (let m in dbNilai[mapel]) {
                    const b = document.createElement('span');
                    b.style = "padding:8px 12px; background:#e0e7ff; border-radius:8px; font-size:12px; cursor:pointer; margin-right:5px;";
                    b.innerHTML = `${m} <span onclick="hapusMateri(event, '${m}')" style="color:red; margin-left:5px;">&times;</span>`;
                    b.onclick = function() { loadMateriLama(m); };
                    box.appendChild(b);
                }
            }
        }

        function hapusMateri(e, namaMateri) {
            e.stopPropagation();
            delete dbNilai[document.getElementById('mapel').value][namaMateri];
            localStorage.setItem('db_edunexa_v8', JSON.stringify(dbNilai));
            refreshRiwayat();
        }

        function loadMateriLama(materi) {
            document.getElementById('materi').value = materi;
            let data = dbNilai[document.getElementById('mapel').value][materi];
            document.querySelectorAll('.nilai-input').forEach((inp, idx) => inp.value = data[idx] || "");
            hitungStatistik();
        }

        async function bagikanCSV() {
            const mapel = document.getElementById('mapel').value;
            const materi = document.getElementById('materi').value.trim();
            let csv = "Nama;" + materi + "\n";
            daftarSiswa.forEach((nama, idx) => { csv += nama + ";" + (document.querySelectorAll('.nilai-input')[idx].value || "0") + "\n"; });
            const file = new File([csv], `Nilai_${mapel}_${materi}.csv`, { type: 'text/csv' });
            if (navigator.canShare) await navigator.share({ files: [file] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(file); a.download = file.name; a.click(); }
        }

        initApp();
    </script>
</body>
</html>
